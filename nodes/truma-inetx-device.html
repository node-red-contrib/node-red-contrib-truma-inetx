<script type="text/javascript">
  RED.nodes.registerType('truma-inetx-device', {
    category: 'config',
    defaults: {
      name: { value: '' },
      bluetooth: { value: 'auto' },
      debug: { value: false }
    },
    label: function () {
      return this.name || 'Truma iNet X';
    }
  });
</script>

<script type="text/html" data-template-name="truma-inetx-device">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name">
  </div>
  <div class="form-row">
    <label for="node-config-input-bluetooth"><i class="fa fa-bluetooth"></i> Bluetooth</label>
    <select id="node-config-input-bluetooth">
      <option value="auto">auto</option>
      <option value="bluez">bluez</option>
      <option value="noble">noble</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-debug"><i class="fa fa-bug"></i> Debug</label>
    <input type="checkbox" id="node-config-input-debug" style="display:inline-block;width:auto;vertical-align:top;">
  </div>
</script>

<script type="text/html" data-help-name="truma-inetx-device">
  <p>Configures a Truma iNet X Bluetooth device and caches the discovered topic tree.</p>
</script>
